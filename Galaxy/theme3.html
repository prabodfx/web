<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andromeda Welcome</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        #galaxyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .welcome-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(200, 180, 255, 0.9);
            text-align: center;
            z-index: 2;
            text-shadow: 0 0 20px rgba(178, 132, 190, 0.7);
            animation: textGlow 3s ease-in-out infinite;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 0.2em;
        }

        @keyframes textGlow {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 20px rgba(178, 132, 190, 0.7); }
            50% { opacity: 1; text-shadow: 0 0 40px rgba(200, 150, 255, 0.9); }
        }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>
    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Galaxy parameters
        const stars = [];
        const starCount = 600; // Further reduced star count
        const centerX = width/2;
        const centerY = height/2;

        class Star {
            constructor() {
                this.reset(true);
            }

            reset() {
                // New distribution formula for corner spread
                const distributionType = Math.random();
                
                if(distributionType < 0.4) { // Corner stars
                    this.angle = Math.atan2(
                        Math.random() * height - centerY,
                        Math.random() * width - centerX
                    );
                    this.distance = Math.sqrt(
                        Math.pow(width/2, 2) + 
                        Math.pow(height/2, 2)
                    ) * Math.random();
                    this.speed = Math.random() * 0.0005 + 0.0002;
                } else { // Spiral arm stars
                    this.angle = Math.random() * Math.PI * 2;
                    this.distance = Math.pow(Math.random(), 0.3) * Math.min(width, height)/2;
                    this.speed = Math.random() * 0.001 + 0.0005;
                }
                
                this.size = Math.random() * 1.2 + 0.3;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.z = Math.random() * 0.5 + 0.3;
                this.wave = Math.random() * Math.PI * 2;
            }

            update() {
                this.angle += this.speed;
                this.wave += 0.015;
                
                // Stronger corner push
                const waveOffset = Math.sin(this.wave) * 100 * this.z;
                const spiralX = Math.cos(this.angle * 1.5) * this.distance;
                const spiralY = Math.sin(this.angle * 1.5) * this.distance;
                
                this.x = centerX + spiralX + waveOffset;
                this.y = centerY + spiralY + waveOffset;
            }
        }

        // Create stars
        for(let i = 0; i < starCount; i++) {
            stars.push(new Star());
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Smaller core glow
            const coreGradient = ctx.createRadialGradient(
                centerX, centerY, 0, 
                centerX, centerY, 80
            );
            coreGradient.addColorStop(0, 'rgba(255, 220, 180, 0.15)');
            coreGradient.addColorStop(1, 'rgba(50, 40, 120, 0)');
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(draw);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars.forEach(star => star.reset());
        });

        // Start animation
        draw();
    </script>
</body>
</html>
