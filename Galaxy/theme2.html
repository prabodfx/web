<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Area 9.9</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #0e001b, #000);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #e0caff;
      font-size: 2.8em;
      font-weight: 600;
      text-shadow:
        0 0 10px rgba(180, 100, 255, 0.6),
        0 0 20px rgba(180, 100, 255, 0.4),
        0 0 30px rgba(180, 100, 255, 0.3);
      z-index: 1;
      padding: 0 20px;
      opacity: 0;
      animation: fadeInFloat 3s ease-out forwards;
    }

    @keyframes fadeInFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, -60%);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }
  </style>
</head>
<body>
  <canvas id="galaxy"></canvas>
  <div class="center-text">WELCOME TO <br> Area 9.9</div>

  <script>
    const canvas = document.getElementById('galaxy');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createStars(count) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          z: Math.random() * canvas.width
        });
      }
    }

    function drawStars() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const focalLength = canvas.width;

      ctx.fillStyle = "rgba(10, 0, 25, 0.3)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let star of stars) {
        star.z -= 2;

        if (star.z <= 0) {
          star.z = canvas.width;
        }

        const k = focalLength / star.z;
        const x = (star.x - cx) * k + cx;
        const y = (star.y - cy) * k + cy;

        if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;

        const size = (1 - star.z / canvas.width) * 2;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(200, 100, 255, 0.8)";
        ctx.shadowColor = "rgba(200, 100, 255, 0.6)";
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function animate() {
      drawStars();
      requestAnimationFrame(animate);
    }

    createStars(500);
    animate();
  </script>
</body>
</html>
